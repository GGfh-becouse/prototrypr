<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    <title>FIFA - Система прогнозирования матчей</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0a0e1a;
            color: #fff;
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(26, 35, 126, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(13, 71, 161, 0.2) 0%, transparent 70%);
            background-attachment: fixed;
        }

        /* Анимированный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(90deg, 
                    transparent 0px, 
                    rgba(255, 215, 0, 0.02) 1px, 
                    transparent 2px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* HEADER FIFA STYLE */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            background: linear-gradient(135deg, rgba(10, 14, 26, 0.95), rgba(26, 35, 126, 0.8));
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header img {
            max-height: 60px;
            width: auto;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
        }

        .header h1 {
            font-size: 1.8em;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            letter-spacing: 2px;
        }

        .header h1 .fifa {
            color: #ffd700;
            -webkit-text-fill-color: #ffd700;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-badge {
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            color: #ffd700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-badge .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* TABS FIFA STYLE */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 28px;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.5px;
        }

        .tab-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #1a237e, #283593);
            color: #ffd700;
            box-shadow: 0 4px 15px rgba(26, 35, 126, 0.4);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CARDS FIFA STYLE */
        .card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
        }

        .card:hover {
            border-color: rgba(255, 215, 0, 0.15);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.2em;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.1);
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .icon {
            font-size: 1.4em;
        }

        /* IMPORT SECTION */
        .import-section {
            background: linear-gradient(135deg, rgba(26, 35, 126, 0.3), rgba(13, 71, 161, 0.2));
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .import-section textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            transition: all 0.3s;
        }

        .import-section textarea:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }

        .import-section textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* FORM FIFA STYLE */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, 
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Montserrat', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.05);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input[type="number"] {
            width: 80px;
            display: inline-block;
        }

        .form-group select option {
            background: #1a1a2e;
            color: #fff;
        }

        .form-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .form-row label {
            font-size: 11px;
            font-weight: 600;
            min-width: 60px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        .form-row input[type="number"] {
            width: 60px;
            padding: 6px 10px;
        }

        .team-header {
            font-size: 1.3em;
            font-weight: 800;
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-header.team-a {
            background: linear-gradient(135deg, rgba(26, 35, 126, 0.3), rgba(26, 35, 126, 0.1));
            border-left: 4px solid #3f51b5;
            color: #7c8bcb;
        }

        .team-header.team-b {
            background: linear-gradient(135deg, rgba(230, 81, 0, 0.3), rgba(230, 81, 0, 0.1));
            border-left: 4px solid #ff5722;
            color: #ff8a65;
        }

        /* BUTTONS FIFA STYLE */
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #f9a825);
            color: #0a0e1a;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: #fff;
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(76, 175, 80, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f44336, #c62828);
            color: #fff;
            box-shadow: 0 4px 20px rgba(244, 67, 54, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(244, 67, 54, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 11px;
        }

        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #f9a825);
            color: #0a0e1a;
            font-weight: 800;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.4);
        }

        /* MATCH RESULT BUTTONS */
        .match-result-btn {
            display: inline-block;
            padding: 5px 14px;
            margin: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
        }

        .match-result-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .match-result-btn.selected-win {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
            border-color: #4caf50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.1);
        }

        .match-result-btn.selected-draw {
            background: rgba(255, 215, 0, 0.3);
            color: #ffd700;
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }

        .match-result-btn.selected-loss {
            background: rgba(244, 67, 54, 0.3);
            color: #f44336;
            border-color: #f44336;
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.1);
        }

        /* RATING TYPE SELECTOR */
        .rating-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .rating-type-selector label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }

        .rating-type-selector label:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .rating-type-selector label.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.05);
        }

        .rating-type-selector label input[type="radio"] {
            display: none;
        }

        /* RESULTS FIFA STYLE */
        .score-prediction {
            background: linear-gradient(135deg, #1a237e, #0d1757);
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            margin: 15px 0;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .score-prediction::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 215, 0, 0.03), transparent 70%);
            animation: rotate-glow 20s linear infinite;
        }

        @keyframes rotate-glow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .score-prediction .score {
            font-size: 3.5em;
            font-weight: 900;
            letter-spacing: 8px;
            position: relative;
            z-index: 1;
        }

        .score-prediction .score span {
            color: #ffd700;
        }

        .score-prediction .vs-text {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
            margin: 0 20px;
        }

        .penalty-prediction {
            background: linear-gradient(135deg, #e65100, #bf360c);
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            margin: 15px 0;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
        }

        .penalty-prediction .score {
            font-size: 2.8em;
            font-weight: 900;
            letter-spacing: 5px;
        }

        .penalty-prediction .score span {
            color: #ffd54f;
        }

        .next-scorer {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 215, 0, 0.02));
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin: 15px 0;
        }

        .next-scorer .name {
            font-size: 1.8em;
            font-weight: 800;
            color: #ffd700;
        }

        .next-scorer .team-name {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
        }

        /* PROBABILITY BARS */
        .prob-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .prob-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s ease;
        }

        .prob-fill.a {
            background: linear-gradient(90deg, #3f51b5, #1a237e);
        }
        .prob-fill.b {
            background: linear-gradient(90deg, #ff5722, #e65100);
        }
        .prob-fill.draw {
            background: linear-gradient(90deg, #ffd700, #f9a825);
        }

        /* SCORERS LIST */
        .scorers-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .scorer-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border-left: 3px solid #ffd700;
        }

        .scorer-item .time {
            color: #ffd700;
            font-weight: 700;
        }

        /* HISTORY TABLE */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .history-table th {
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            padding: 12px 15px;
            text-align: left;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .history-table td {
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.8);
        }

        .history-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .history-table .actual-win {
            color: #4caf50;
            font-weight: 700;
        }
        .history-table .actual-loss {
            color: #f44336;
            font-weight: 700;
        }
        .history-table .actual-draw {
            color: #ffd700;
            font-weight: 700;
        }

        /* ALERTS */
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.15);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
        }

        .alert-info {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .import-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            color: #4caf50;
        }

        .import-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            color: #f44336;
        }

        /* SETTINGS */
        .settings-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            flex-wrap: wrap;
        }

        .settings-item label {
            font-weight: 600;
            min-width: 150px;
            color: rgba(255, 255, 255, 0.7);
        }

        .settings-item input[type="range"] {
            flex: 1;
            max-width: 300px;
            background: rgba(255, 255, 255, 0.05);
            height: 4px;
            border-radius: 2px;
            -webkit-appearance: none;
        }

        .settings-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #ffd700;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .settings-item .weight-value {
            font-weight: 700;
            color: #ffd700;
            min-width: 40px;
        }

        .settings-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #ffd700;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .header-left {
                flex-direction: column;
            }

            .header h1 {
                font-size: 1.4em;
            }

            .tabs {
                flex-direction: column;
                gap: 5px;
            }

            .tab-btn {
                width: 100%;
                text-align: center;
                padding: 10px;
            }

            .scorers-list {
                grid-template-columns: 1fr;
            }

            .header-right {
                width: 100%;
                justify-content: center;
            }

            .score-prediction .score {
                font-size: 2.5em;
                letter-spacing: 3px;
            }

            .settings-item {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .settings-item input[type="range"] {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }

            .card {
                padding: 15px;
            }

            .form-row {
                flex-direction: column;
                align-items: stretch;
            }

            .form-row input[type="number"] {
                width: 100%;
            }

            .score-prediction .score {
                font-size: 2em;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER FIFA STYLE -->
        <div class="header">
            <div class="header-left">
                <img src="image.png" alt="FIFA" onerror="this.style.display='none'">
                <h1>⚽ <span class="fifa">FIFA</span> Predictor</h1>
            </div>
            <div class="header-right">
                <div class="header-badge">
                    <span class="dot"></span>
                    Система прогнозирования
                </div>
                <div class="header-badge" style="background:rgba(76,175,80,0.1); border-color:rgba(76,175,80,0.3); color:#4caf50;">
                    ● LIVE
                </div>
            </div>
        </div>

        <!-- TABS -->
        <div class="tabs">
